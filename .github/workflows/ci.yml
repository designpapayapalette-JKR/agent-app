name: Agent Mobile CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Audit dependencies (high/critical)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Generate expo-env.d.ts
        # Gitignored by Expo convention (normally regenerated by the Expo CLI on
        # first `expo start`/`expo prebuild`). This workflow never runs either,
        # so without this step `tsc` can't see expo/types' ambient module
        # declarations (e.g. `*.css` for the global.css side-effect import) and
        # fails with TS2882 even though the app is fine.
        run: printf '/// <reference types="expo/types" />\n' > expo-env.d.ts

      - name: Typecheck
        run: npm run typecheck
